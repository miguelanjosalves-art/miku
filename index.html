<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Dark World Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
</head>
<body>

    <div class="grid-background">
        <div class="grid-lines"></div>
    </div>

    <img src="https://media.tenor.com/8vzE-cNf_VMAAAAi/kris-deltarune-kris.gif" class="char kris" alt="Kris">
    <img src="https://media.tenor.com/8qguU3aky9IAAAAi/susie-deltarune.gif" class="char susie" alt="Susie">
    <img src="https://media.tenor.com/tN52ozwR04EAAAAi/spin-ralsei.gif" class="char ralsei" alt="Ralsei">

    <div class="container">
        <h2>RECRUTAMENTO DA PARTY</h2>
        <form action="#">
            <div class="form-group">
                <label>NOME DO HUMANO:</label>
                <input type="text" placeholder="..." required>
            </div>

            <div class="form-group">
                <label>E-MAIL DE CONTATO:</label>
                <input type="email" placeholder="LINK.EXE" required>
            </div>

            <div class="form-group">
                <label>TIPO DE ALMA:</label>
                <select>
                    <option value="">SELECIONE...</option>
                    <option>DETERMINAÇÃO</option>
                    <option>BRAVURA</option>
                    <option>JUSTIÇA</option>
                </select>
            </div>

            <button type="submit">[ ENTRAR NA BATALHA ]</button>
        </form>
    </div>

</body>
</html>
